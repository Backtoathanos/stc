name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: backtothanos
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: docker build -t backtothanos/php-app:latest .

      - name: Push Image
        run: docker push backtothanos/php-app:latest
