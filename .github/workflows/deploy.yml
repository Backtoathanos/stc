name: Deploy to GoDaddy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: stc_gld/package-lock.json

      - name: Build stc_gld (production bundle)
        run: |
          cd stc_gld
          npm ci
          npm run build

      - name: Upload stc_gld/build to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "stc_gld/build/*"
          target: "~/public_html/stc_gld/build"
          rm: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/public_html
            git fetch origin
            git reset --hard origin/main

            # Restore stc_gld .htaccess
            cat > ~/public_html/stc_gld/.htaccess << 'HTEOF'
            RewriteEngine On
            RewriteBase /stc_gld/
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ build/index.html [QSA,L]
            HTEOF

            # Restore stc_gld/build .htaccess
            cat > ~/public_html/stc_gld/build/.htaccess << 'HTEOF'
            RewriteEngine On
            RewriteBase /stc_gld/build/
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ index.html [QSA,L]
            HTEOF

            # Fix permissions
            find ~/public_html/stc_gld/build -type d -exec chmod 755 {} \;
            find ~/public_html/stc_gld/build -type f -exec chmod 644 {} \;

            echo "Deployed at $(date)"