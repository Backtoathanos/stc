name: Deploy to STC Associate

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy and Build via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            export TERM=xterm

            # Pull latest code
            cd ~/public_html
            git fetch origin
            git reset --hard origin/main

            # Build React app
            cd ~/public_html/stc_gld
            npm ci
            npm run build

            # Restore stc_gld .htaccess
            printf 'RewriteEngine On\nRewriteBase /stc_gld/\nRewriteRule ^$ build/index.html [L]\nRewriteRule ^build/(.*)$ build/$1 [L]\nRewriteCond %%{REQUEST_FILENAME} !-f\nRewriteCond %%{REQUEST_FILENAME} !-d\nRewriteRule ^ build/index.html [QSA,L]\n' > ~/public_html/stc_gld/.htaccess

            # Restore build .htaccess
            printf 'RewriteEngine On\nRewriteBase /stc_gld/build/\nRewriteCond %%{REQUEST_FILENAME} !-f\nRewriteCond %%{REQUEST_FILENAME} !-d\nRewriteRule ^ index.html [QSA,L]\n' > ~/public_html/stc_gld/build/.htaccess

            # Fix permissions
            find ~/public_html/stc_gld/build -type d -exec chmod 755 {} \;
            find ~/public_html/stc_gld/build -type f -exec chmod 644 {} \;

            # Verify files exist
            echo "--- Verify .htaccess ---"
            cat ~/public_html/stc_gld/.htaccess
            cat ~/public_html/stc_gld/build/.htaccess

            echo "--- Verify build index ---"
            ls -la ~/public_html/stc_gld/build/index.html

            echo "✅ Deployed at $(date)"

      - name: Verify site is live
        run: |
          sleep 5
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://stcassociate.com/stc_gld/build/)
          echo "Site status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Site returned $STATUS — deploy may have failed!"
            exit 1
          fi
          echo "✅ Site is live!"