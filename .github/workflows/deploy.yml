name: Deploy to GoDaddy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy and Build via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            export TERM=xterm
            cd ~/public_html

            # Pull latest code
            git fetch origin
            git reset --hard origin/main

            # Build React app on server
            cd ~/public_html/stc_gld
            npm ci
            npm run build

            # Restore .htaccess files
            cat > ~/public_html/stc_gld/.htaccess << 'HTEOF'
RewriteEngine On
RewriteBase /stc_gld/
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule ^ build/index.html [QSA,L]
HTEOF

            cat > ~/public_html/stc_gld/build/.htaccess << 'HTEOF'
RewriteEngine On
RewriteBase /stc_gld/build/
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule ^ index.html [QSA,L]
HTEOF

            # Fix permissions
            find ~/public_html/stc_gld/build -type d -exec chmod 755 {} \;
            find ~/public_html/stc_gld/build -type f -exec chmod 644 {} \;

            echo "Deployed at $(date)"