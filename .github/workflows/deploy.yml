name: Deploy to STC Associate

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH (unzip build-archive.zip)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            export TERM=xterm

            # Pull latest code
            cd ~/public_html
            git fetch origin
            git reset --hard origin/main

            cd ~/public_html/stc_gld

            if [ ! -f build-archive.zip ]; then
              echo "❌ build-archive.zip not found. Run deploy-stc-gld.ps1 (or deploy-stc-gld.sh) locally to build, zip, commit, and push."
              exit 1
            fi

            echo "--- Expanding build-archive.zip into build/ ---"
            rm -rf build
            unzip -o -q build-archive.zip

            if [ ! -f build/index.html ]; then
              echo "❌ unzip did not produce build/index.html"
              exit 1
            fi

            # Do not overwrite stc_gld/.htaccess: the repo file maps /stc_gld/static and
            # /stc_gld/assets into build/.

            # Fix permissions
            find ~/public_html/stc_gld/build -type d -exec chmod 755 {} \;
            find ~/public_html/stc_gld/build -type f -exec chmod 644 {} \;

            # Verify files exist
            echo "--- Verify .htaccess (must rewrite assets + static into build/) ---"
            head -n 30 ~/public_html/stc_gld/.htaccess

            echo "--- Verify build index ---"
            ls -la ~/public_html/stc_gld/build/index.html

            echo "✅ Deployed at $(date)"

      - name: Verify site is live
        run: |
          sleep 5
          # App is served from /stc_gld/ with assets at /stc_gld/assets/ (not inside /build/ in the URL)
          APP=$(curl -o /dev/null -s -w "%{http_code}" https://stcassociate.com/stc_gld/)
          JS=$(curl -o /dev/null -s -w "%{http_code}" https://stcassociate.com/stc_gld/assets/js/core/jquery.min.js)
          echo "GET /stc_gld/ -> $APP"
          echo "GET /stc_gld/assets/js/core/jquery.min.js -> $JS"
          if [ "$APP" != "200" ] || [ "$JS" != "200" ]; then
            echo "❌ Expected 200 for app shell and jQuery — check .htaccess rewrites (APP=$APP JS=$JS)"
            exit 1
          fi
          echo "✅ Site is live!"