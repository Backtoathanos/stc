apiVersion: apps/v1
kind: Deployment

metadata:
  name: php-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: php-app

  template:
    metadata:
      labels:
        app: php-app

    spec:
      containers:
      - name: php
        image: backtothanos/php-app:v5

        ports:
        - containerPort: 80